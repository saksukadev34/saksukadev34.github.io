<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GodbyDepo | Secure Cloud Vault</title>
    <!-- Google Font & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080808;
            --panel-bg: #121212;
            --neon-pink: #ff00ff;
            --neon-red: #ff3131;
            --text-green: #00ff41;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-dark);
            color: white; font-family: 'Fira Code', monospace;
            overflow: hidden;
        }

        /* --- ROBOT VERIFICATION (CAPTCHA) --- */
        #captcha-screen {
            position: fixed; inset: 0; background: black;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999;
        }
        .captcha-box {
            border: 2px solid var(--neon-red);
            padding: 40px; text-align: center;
            box-shadow: 0 0 20px var(--neon-red);
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9998;
        }

        /* --- MAIN DASHBOARD --- */
        #main-app { display: none; height: 100vh; flex-direction: column; }

        header {
            height: 60px; background: var(--panel-bg);
            display: flex; justify-content: space-between;
            align-items: center; padding: 0 20px;
            border-bottom: 1px solid var(--neon-pink);
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--neon-pink); letter-spacing: 2px; }

        .nav-btns button {
            background: var(--neon-red); color: white; border: none;
            padding: 10px 20px; font-weight: bold; cursor: pointer;
            border-radius: 4px; transition: 0.3s;
        }
        .nav-btns button:hover { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

        /* --- EDITOR AREA --- */
        .content-wrapper { display: flex; flex: 1; overflow: hidden; }
        
        #editor-container {
            flex: 1; display: flex; flex-direction: column;
            border-right: 1px solid #333;
        }

        textarea {
            flex: 1; background: #000; color: var(--text-green);
            padding: 20px; border: none; outline: none;
            font-size: 16px; resize: none; font-family: 'Fira Code', monospace;
        }

        #preview-container { flex: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; }

        /* --- MITO AI ROBOT --- */
        #mito-bot {
            position: fixed; bottom: 20px; right: 20px;
            width: 70px; cursor: pointer; z-index: 100;
            transition: transform 0.3s;
        }
        #mito-bot:hover { transform: scale(1.2) rotate(10deg); }

        #mito-bubble {
            position: fixed; bottom: 100px; right: 30px;
            background: var(--panel-bg); border: 1px solid var(--neon-pink);
            padding: 15px; border-radius: 10px; width: 250px;
            display: none; box-shadow: 0 0 15px var(--neon-pink);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 1. ROBOT TESTİ -->
    <div id="captcha-screen">
        <div class="captcha-box">
            <h2 style="color: var(--neon-red);">SECURITY CHECK</h2>
            <p>Are you a robot or a Godby Developer?</p>
            <button onclick="verifyRobot()" style="padding: 10px 30px; cursor: pointer;">I AM HUMAN</button>
        </div>
    </div>

    <!-- 2. LOGIN (GOOGLE SİMÜLASYONU) -->
    <div id="login-screen">
        <h1 class="logo">GODBYDEPO</h1>
        <p>Private Code Cloud & Infrastructure</p>
        <button onclick="loginWithGoogle()" style="background: white; color: black; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; border: none;">
            LOGIN WITH GOOGLE
        </button>
    </div>

    <!-- 3. ANA UYGULAMA -->
    <div id="main-app">
        <header>
            <div class="logo">GODBY</div>
            <div class="nav-btns">
                <button onclick="deployCode()">+ DEPLOY (CREATE)</button>
            </div>
        </header>

        <div class="content-wrapper">
            <div id="editor-container">
                <div style="background: #1a1a1a; padding: 5px 15px; font-size: 12px; color: #888;">EDITOR / index.html</div>
                <textarea id="code-editor" spellcheck="false" placeholder="Write your private code here..."></textarea>
            </div>
            <div id="preview-container">
                <div style="background: #eee; padding: 5px 15px; font-size: 12px; color: #333;">LIVE PREVIEW (ENCRYPTED)</div>
                <iframe id="live-view"></iframe>
            </div>
        </div>
    </div>

    <!-- MITO AI -->
    <div id="mito-bubble">
        <div id="mito-text">Hello! I'm Mito AI. What should we build today?</div>
        <hr style="border: 0.5px solid #333; margin: 10px 0;">
        <button onclick="mitoFootball()" style="font-size: 10px; cursor:pointer;">BUILD FOOTBALL GAME</button>
        <button onclick="mitoClose()" style="font-size: 10px; cursor:pointer;">CLOSE</button>
    </div>
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" id="mito-bot" onclick="toggleMito()">

    <script>
        const editor = document.getElementById('code-editor');
        const preview = document.getElementById('live-view');

        // 1. Doğrulama
        function verifyRobot() {
            document.getElementById('captcha-screen').classList.add('hidden');
            document.getElementById('login-screen').style.display = 'flex';
        }

        // 2. Giriş
        function loginWithGoogle() {
            const mail = prompt("Enter your email for Godby Access:");
            if(mail) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').style.display = 'flex';
                alert("Welcome, " + mail + "! Your vault is ready.");
            }
        }

        // 3. Kod Çalıştırma (Real-time)
        editor.addEventListener('input', () => {
            const content = editor.value;
            const frameDoc = preview.contentWindow.document;
            frameDoc.open();
            frameDoc.write(content);
            frameDoc.close();
        });

        // 4. Mito AI Fonksiyonları
        function toggleMito() {
            const bubble = document.getElementById('mito-bubble');
            bubble.style.display = (bubble.style.display === 'block') ? 'none' : 'block';
        }

        function mitoClose() { document.getElementById('mito-bubble').style.display = 'none'; }

        function mitoFootball() {
            const footballCode = `
<!DOCTYPE html>
<html>
<body style="background: green; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow:hidden;">
    <div id="ball" style="width: 50px; height: 50px; background: white; border-radius: 50%; position: absolute; left: 0; transition: 1s;"></div>
    <h1 id="goal" style="color: yellow; display: none; font-family: sans-serif;">GOOOOAL!</h1>
    <script>
        const ball = document.getElementById('ball');
        const goalTxt = document.getElementById('goal');
        setTimeout(() => {
            ball.style.left = '80%';
            setTimeout(() => { 
                goalTxt.style.display = 'block';
                ball.style.display = 'none';
            }, 1000);
        }, 500);
    <\/script>
</body>
</html>`;
            editor.value = footballCode.trim();
            editor.dispatchEvent(new Event('input')); // Otomatik çalıştır
            document.getElementById('mito-text').innerText = "Mito: Here is your football goal animation! Check the preview.";
        }

        function deployCode() {
            alert("Sistem: Kodunuz GodbyDepo üzerinde şifrelendi ve yayına alındı! (Link: https://godbydepo.io/user/project_vault)");
        }
    </script>
</body>
</html>
