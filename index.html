<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1948 #BaşKaş</title>
    <style>
        :root { --bg: #0a0a0a; --panel: #151515; --accent: #2ecc71; --text: #ffffff; --border: #222; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* AUTH */
        #authBox { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-card { width: 320px; padding: 40px; background: var(--panel); border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 10px; box-sizing: border-box; }
        .btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 900; cursor: pointer; }

        /* SIDEBAR */
        nav { width: 260px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .site-title { font-size: 22px; font-weight: 900; color: var(--accent); margin-bottom: 30px; }
        .ch { padding: 15px; border-radius: 12px; cursor: pointer; color: #666; margin-bottom: 8px; font-weight: 700; transition: 0.2s; }
        .ch.active, .ch:hover { background: #222; color: var(--accent); }
        .ch::before { content: "# "; opacity: 0.5; }

        /* ADMIN PANEL (Sadece Rambler Görür) */
        #userTracker { margin-top: auto; padding: 10px; background: #000; border-radius: 10px; font-size: 11px; border: 1px solid #333; max-height: 150px; overflow-y: auto; }

        /* MAIN */
        main { flex: 1; display: flex; flex-direction: column; }
        header { height: 70px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .user-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .u-pfp { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }

        #feed { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 650px; }

        .card { background: var(--panel); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        .god-badge { color: var(--accent); font-size: 10px; font-weight: 900; border: 1px solid var(--accent); padding: 2px 6px; border-radius: 5px; margin-left: 10px; }
        video { width: 100%; border-radius: 15px; margin-top: 15px; }

        .fab { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--accent); color: #000; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 35px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 20px rgba(46, 204, 113, 0.4); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 11000; }
        .modal-content { background: var(--panel); padding: 30px; border-radius: 25px; width: 350px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="authBox">
        <div class="auth-card">
            <h1 style="color:var(--accent); margin-bottom:5px;">1948</h1>
            <p style="font-size:12px; color:#555; margin-bottom:20px;">#BaşKaş</p>
            <input type="email" id="mIn" placeholder="E-posta">
            <input type="password" id="pIn" placeholder="Şifre">
            <button class="btn" onclick="login()">Giriş Yap</button>
        </div>
    </div>

    <nav>
        <div class="site-title">1948 #BaşKaş</div>
        <div class="ch active" onclick="setCh('duyurullah', this)">duyurullah</div>
        <div class="ch" onclick="setCh('nasıl adam olurum ?', this)">nasıl adam olurum ?</div>
        
        <div id="adminView" style="display:none; margin-top:20px;">
            <p style="font-size:10px; color:var(--accent); margin-bottom:5px;">KAYITLI KULLAR:</p>
            <div id="userTracker"></div>
        </div>

        <button class="btn" style="margin-top:auto; background:#ff4444; color:#fff;" onclick="logout()">Çıkış</button>
    </nav>

    <main>
        <header>
            <div id="chTitle" style="color:var(--accent); font-weight:900;"># duyurullah</div>
            <div class="user-info" onclick="openM('setM')">
                <span id="uName">...</span>
                <img id="uPfp" class="u-pfp" src="">
            </div>
        </header>

        <div id="feed">
            <div class="container">
                <div id="posts"></div>
            </div>
        </div>
    </main>

    <div id="addBtn" class="fab" onclick="openM('postM')">+</div>

    <!-- MODALLAR -->
    <div id="postM" class="modal">
        <div class="modal-content">
            <h3>Hüküm Ver</h3>
            <textarea id="postT" style="width:100%; height:100px; background:#000; color:#fff; border:1px solid #333; padding:10px; border-radius:10px; resize:none;"></textarea>
            <input type="file" id="postV" accept="video/*" style="margin-top:10px;">
            <button class="btn" style="margin-top:15px;" onclick="send()">Yayınla</button>
            <button class="btn" style="background:transparent; color:red;" onclick="closeM('postM')">İptal</button>
        </div>
    </div>

    <div id="setM" class="modal">
        <div class="modal-content">
            <h3>Varlık Ayarları</h3>
            <input type="text" id="newName" placeholder="Yeni İsim">
            <input type="file" id="newPfp" accept="image/*">
            <button class="btn" onclick="saveP()">Kaydet</button>
            <button class="btn" style="background:transparent; color:red;" onclick="closeM('setM')">Kapat</button>
        </div>
    </div>

    <script>
        let user = null;
        let channel = "duyurullah";
        const ADMIN_MAIL = "ruslanantonovow6837@rambler.ru";
        const ADMIN_PASS = "NggOEkqww0912xyt";

        window.onload = () => {
            const saved = localStorage.getItem('bk_user');
            if(saved) { user = JSON.parse(saved); document.getElementById('authBox').style.display = 'none'; init(); }
        };

        function login() {
            const m = document.getElementById('mIn').value;
            const p = document.getElementById('pIn').value;
            if(!m || !p) return;

            if(m === ADMIN_MAIL && p !== ADMIN_PASS) return alert("Şifre Yanlış!");

            user = { mail: m, name: m.split('@')[0], isGod: (m === ADMIN_MAIL) };
            localStorage.setItem('bk_user', JSON.stringify(user));
            
            // Kullanıcıyı listeye ekle
            let users = JSON.parse(localStorage.getItem('bk_users') || "[]");
            if(!users.includes(m)) users.push(m);
            localStorage.setItem('bk_users', JSON.stringify(users));

            document.getElementById('authBox').style.display = 'none';
            init();
        }

        function init() {
            document.getElementById('uName').innerText = user.name;
            document.getElementById('adminView').style.display = user.isGod ? 'block' : 'none';
            document.getElementById('addBtn').style.display = user.isGod ? 'flex' : 'none';
            if(user.isGod) trackUsers();
            render();
        }

        function trackUsers() {
            const users = JSON.parse(localStorage.getItem('bk_users') || "[]");
            document.getElementById('userTracker').innerHTML = users.map(u => `<div>• ${u}</div>`).join('');
        }

        function setCh(c, el) {
            channel = c;
            document.querySelectorAll('.ch').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('chTitle').innerText = "# " + c;
            render();
        }

        function openM(id) { if(user.isGod || id === 'setM') document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        async function saveP() {
            const n = document.getElementById('newName').value;
            const f = document.getElementById('newPfp').files[0];
            if(n) { user.name = n; localStorage.setItem('bk_user', JSON.stringify(user)); }
            if(f) localStorage.setItem('pfp_' + user.mail, await b64(f));
            location.reload();
        }

        async function send() {
            const t = document.getElementById('postT').value;
            const f = document.getElementById('postV').files[0];
            const v = f ? await b64(f) : null;
            let db = JSON.parse(localStorage.getItem('bk_db') || "[]");
            db.unshift({ t, v, ch: channel, u: user.name, e: user.mail, time: new Date().toLocaleString() });
            localStorage.setItem('bk_db', JSON.stringify(db));
            closeM('postM');
            render();
        }

        function render() {
            const db = JSON.parse(localStorage.getItem('bk_db') || "[]");
            const filter = db.filter(x => x.ch === channel);
            document.getElementById('uPfp').src = localStorage.getItem('pfp_' + user.mail) || "";
            document.getElementById('posts').innerHTML = filter.map(x => `
                <div class="card">
                    <div style="font-weight:900; color:var(--accent)">
                        ${x.u} ${x.e === ADMIN_MAIL ? '<span class="god-badge">Allah</span>' : ''}
                    </div>
                    <div style="margin-top:10px;">${x.t}</div>
                    ${x.v ? `<video controls src="${x.v}"></video>` : ''}
                    <div style="font-size:10px; color:#333; margin-top:10px;">${x.time}</div>
                </div>
            `).join('');
        }

        function logout() { localStorage.removeItem('bk_user'); location.reload(); }
        function b64(f) { return new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(f); }); }
    </script>
</body>
</html>
