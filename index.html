<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameAir | Future Platform</title>
    <style>
        :root { --accent: #2ecc71; --bg: #f4f7f6; --white: #ffffff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #1a1a1a; }
        
        /* AUTH SCREEN (KAYIT & GİRİŞ) */
        #authScreen { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-card { width: 340px; padding: 30px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { opacity: 0.8; }

        /* MAIN APP */
        #app { display: none; padding-top: 70px; padding-bottom: 100px; }
        header { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: fixed; width: 100%; top: 0; border-bottom: 1px solid #eee; z-index: 1000; box-sizing: border-box; }
        
        .container { max-width: 650px; margin: 0 auto; padding: 0 15px; }

        /* PROFILE DESIGN */
        .profile-box { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; margin-bottom: 25px; }
        #banner { height: 180px; width: 100%; object-fit: cover; background: linear-gradient(45deg, #2ecc71, #27ae60); }
        .pfp-wrap { text-align: center; margin-top: -60px; padding-bottom: 20px; }
        #pfp { width: 110px; height: 110px; border-radius: 50%; border: 5px solid white; background: #eee; object-fit: cover; }

        /* POSTS */
        .post { background: white; padding: 20px; border-radius: 18px; border: 1px solid #eee; margin-top: 20px; animation: fadeIn 0.5s; }
        video { width: 100%; border-radius: 12px; margin-top: 10px; background: #000; }
        .admin-badge { background: #e8f5e9; color: #2ecc71; font-size: 10px; padding: 4px 10px; border-radius: 6px; font-weight: 800; margin-left: 8px; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
        
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 8px 20px rgba(46, 204, 113, 0.4); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-card">
            <h1 style="color:var(--accent); letter-spacing: -1px;">GameAir</h1>
            <p id="authMsg" style="font-size: 14px; color: #666;">Yönetici Hesabını Oluştur</p>
            <input type="email" id="emailInput" placeholder="E-posta Adresiniz">
            <input type="password" id="passInput" placeholder="Şifrenizi Belirleyin">
            <button class="btn" id="authBtn" onclick="handleAuth()">Hesabı Kur ve Başla</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="font-weight: 900; font-size: 22px; color:var(--accent)">GameAir</div>
            <div onclick="openModal('settingsModal')" style="cursor:pointer; font-size: 20px;">⚙️</div>
        </header>

        <div class="container">
            <div class="profile-box">
                <img id="banner" src="" alt="">
                <div class="pfp-wrap">
                    <img id="pfp" src="" alt="">
                    <h2 id="nameDisplay" style="margin: 10px 0 0;">İsimsiz Kullanıcı</h2>
                    <p id="emailDisplay" style="margin: 5px 0 0; color: #888; font-size: 14px;"></p>
                </div>
            </div>

            <div id="feed"></div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3>Profili Özelleştir</h3>
            <input type="text" id="editName" placeholder="Görünecek İsim">
            <label style="font-size: 12px; color: #666;">Profil Fotoğrafı Seç:</label>
            <input type="file" id="editPfp" accept="image/*">
            <label style="font-size: 12px; color: #666;">Banner (Arka Plan) Seç:</label>
            <input type="file" id="editBanner" accept="image/*">
            <button class="btn" onclick="updateProfile()">Değişiklikleri Kaydet</button>
            <button onclick="closeModal('settingsModal')" style="background:none; border:none; color:red; width:100%; margin-top:10px; cursor:pointer;">Kapat</button>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <h3>Yeni İçerik Paylaş</h3>
            <textarea id="postTxt" placeholder="Duyurunuzu yazın..." style="width:100%; height:100px; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; font-family: inherit; resize: none;"></textarea>
            <label style="font-size: 12px; color: #666;">Galeriden Video Seç:</label>
            <input type="file" id="postVid" accept="video/*">
            <button class="btn" onclick="uploadPost()">Yayınla</button>
            <button onclick="closeModal('postModal')" style="background:none; border:none; color:red; width:100%; margin-top:10px; cursor:pointer;">Vazgeç</button>
        </div>
    </div>

    <div class="fab" onclick="openModal('postModal')">+</div>

    <script>
        // SİSTEM BAŞLANGIÇ KONTROLÜ
        window.onload = () => {
            const savedEmail = localStorage.getItem('ga_email');
            if(savedEmail) {
                document.getElementById('authMsg').innerText = "Hoş Geldin! Şifrenle Giriş Yap";
                document.getElementById('authBtn').innerText = "Oturum Aç";
            }
            if(sessionStorage.getItem('ga_session') === 'active') {
                showApp();
            }
        };

        async function handleAuth() {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            const savedEmail = localStorage.getItem('ga_email');
            const savedPass = localStorage.getItem('ga_pass');

            if(!email || !pass) return alert("Lütfen boş bırakma kanka!");

            if(!savedEmail) { // KAYIT OLMA
                localStorage.setItem('ga_email', email);
                localStorage.setItem('ga_pass', pass);
                alert("Hesabın başarıyla kuruldu! Şimdi giriş yapabilirsin.");
                location.reload();
            } else { // GİRİŞ YAPMA
                if(email === savedEmail && pass === savedPass) {
                    sessionStorage.setItem('ga_session', 'active');
                    showApp();
                } else {
                    alert("E-posta veya şifre hatalı!");
                }
            }
        }

        function showApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            renderData();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // DOSYA OKUYUCU (GALERİDEN VERİ ÇEKME)
        function toBase64(file) {
            return new Promise((res, rej) => {
                const reader = new FileReader();
                reader.onload = () => res(reader.result);
                reader.readAsDataURL(file);
            });
        }

        async function updateProfile() {
            const name = document.getElementById('editName').value;
            const pfp = document.getElementById('editPfp').files[0];
            const banner = document.getElementById('editBanner').files[0];

            if(name) localStorage.setItem('ga_name', name);
            if(pfp) localStorage.setItem('ga_pfp', await toBase64(pfp));
            if(banner) localStorage.setItem('ga_banner', await toBase64(banner));

            renderData();
            closeModal('settingsModal');
        }

        async function uploadPost() {
            const text = document.getElementById('postTxt').value;
            const file = document.getElementById('postVid').files[0];
            let video = file ? await toBase64(file) : null;

            const post = { text, video, date: new Date().toLocaleString() };
            let posts = JSON.parse(localStorage.getItem('ga_posts') || "[]");
            posts.unshift(post);
            localStorage.setItem('ga_posts', JSON.stringify(posts));

            renderData();
            closeModal('postModal');
            document.getElementById('postTxt').value = "";
        }

        function renderData() {
            document.getElementById('nameDisplay').innerText = localStorage.getItem('ga_name') || "GameAir User";
            document.getElementById('emailDisplay').innerText = localStorage.getItem('ga_email');
            document.getElementById('pfp').src = localStorage.getItem('ga_pfp') || "";
            document.getElementById('banner').src = localStorage.getItem('ga_banner') || "";

            const posts = JSON.parse(localStorage.getItem('ga_posts') || "[]");
            const uName = localStorage.getItem('ga_name') || "Yönetici";
            
            document.getElementById('feed').innerHTML = posts.map(p => `
                <div class="post">
                    <div style="font-weight:bold">${uName} <span class="admin-badge">YÖNETİCİ</span></div>
                    <p>${p.text}</p>
                    ${p.video ? `<video controls src="${p.video}"></video>` : ''}
                    <div style="font-size:10px; color:#aaa; margin-top:10px;">${p.date}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
