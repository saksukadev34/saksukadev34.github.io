<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDOS BOMB | SORGULAMA MERKEZİ</title>
    <style>
        :root { --bg: #000; --neon-p: #ff00ff; --neon-r: #ff0000; --text: #00ff00; }
        body { margin: 0; font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* MATRIX BG */
        #bgCanvas { position: fixed; inset: 0; z-index: -1; opacity: 0.2; }

        /* SIDEBAR */
        nav { width: 260px; background: #0a0a0a; border-right: 1px solid var(--neon-p); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .logo { font-size: 22px; font-weight: 900; color: var(--neon-p); margin-bottom: 30px; text-shadow: 0 0 10px var(--neon-p); }
        .menu { padding: 12px; cursor: pointer; color: var(--neon-r); border-bottom: 1px solid #222; font-weight: bold; }
        .menu.active, .menu:hover { background: var(--neon-p); color: #000; box-shadow: 0 0 15px var(--neon-p); }

        /* MAIN */
        main { flex: 1; display: flex; flex-direction: column; }
        header { padding: 20px; border-bottom: 1px solid var(--neon-p); display: flex; justify-content: space-between; }
        #panel { flex: 1; overflow-y: auto; padding: 30px; }

        /* CARDS */
        .res-card { background: rgba(15,15,15,0.9); border: 1px solid var(--neon-r); padding: 20px; border-radius: 10px; animation: glitch 0.3s linear; margin-top: 20px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--neon-p); color: var(--neon-p); border-radius: 5px; margin-bottom: 10px; outline: none; }
        .exec-btn { width: 100%; padding: 15px; background: var(--neon-r); color: #fff; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .exec-btn:hover { background: var(--neon-p); color: #000; }

        @keyframes glitch { 
            0% { opacity: 0.5; transform: translateX(-5px); } 
            50% { opacity: 1; transform: translateX(5px); } 
            100% { transform: translateX(0); } 
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <nav>
        <div class="logo">DDOS BOMB v2.5</div>
        <div class="menu" onclick="showTab('ifsa')">IFSA_VIDEO</div>
        <div class="menu active" onclick="showTab('sorgu')">CORE_SORGU_PANELI</div>
        <div class="menu" onclick="showTab('sms')">SMS_ATTACK</div>
        <div class="menu" onclick="showTab('kurallar')">RULES</div>
        <div style="margin-top:auto; font-size:10px; color:#444;">SYSTEM: ONLINE<br>ENCRYPTION: RSA-4096</div>
    </nav>

    <main>
        <header>
            <div id="tabName" style="color:var(--neon-p)">ROOT / CORE_SORGU_PANELI</div>
            <div id="uName" style="color:var(--neon-r)">ADMIN_ROOT</div>
        </header>

        <div id="panel">
            <h2 style="color:var(--neon-r)">DIGITAL INTELLIGENCE DATABASE</h2>
            <p>Aşağıya hedef IP adresini girin. Sistem otomatik olarak global veritabanlarından konum ve ISP bilgilerini çekecektir.</p>
            
            <input type="text" id="targetIn" placeholder="Target IP Address (örn: 8.8.8.8)">
            <button class="exec-btn" onclick="startSorgu()">SORGULA / EXECUTE</button>

            <div id="sorguResult"></div>
        </div>
    </main>

    <script>
        // GERÇEK IP SORGULAMA MOTORU
        async function startSorgu() {
            const ip = document.getElementById('targetIn').value;
            const resArea = document.getElementById('sorguResult');

            if(!ip) return alert("HEDEF BELİRTİLMEDİ!");

            resArea.innerHTML = `<div class="res-card" style="color:var(--neon-p)">[SYSTEM] Veritabanına erişiliyor... 12% 45% 89%</div>`;

            try {
                // Konum ve ISP Verisini Getirir (Gerçek Çalışan API)
                const res = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await res.json();

                if(data.error) throw new Error("Geçersiz IP");

                setTimeout(() => {
                    resArea.innerHTML = `
                        <div class="res-card">
                            <h3 style="color:var(--neon-p); margin-top:0;">[TARGET ACQUIRED]</h3>
                            <div style="margin: 5px 0;"><strong>IP:</strong> ${data.ip}</div>
                            <div style="margin: 5px 0;"><strong>KONUM:</strong> ${data.city} / ${data.region} (${data.country_name})</div>
                            <div style="margin: 5px 0;"><strong>ISP (SAĞLAYICI):</strong> ${data.org}</div>
                            <div style="margin: 5px 0;"><strong>KOORDİNAT:</strong> ${data.latitude}, ${data.longitude}</div>
                            <div style="margin: 15px 0 5px 0;">
                                <a href="https://www.google.com/maps?q=${data.latitude},${data.longitude}" target="_blank" style="color:var(--neon-r); font-weight:bold;">[ HARİTADA GÖRÜNTÜLE ]</a>
                            </div>
                            <div style="font-size:10px; color:#555; margin-top:10px;">TIMESTAMP: ${new Date().toLocaleString()}</div>
                        </div>
                    `;
                }, 1500);
            } catch (err) {
                resArea.innerHTML = `<div class="res-card" style="color:red">[HATA] IP adresi bulunamadı veya bağlantı reddedildi.</div>`;
            }
        }

        // MATRIX BG ANIMATION
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const columns = canvas.width / 10;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff00ff";
            ctx.font = "10px monospace";
            for(let i = 0; i < drops.length; i++) {
                const text = Math.floor(Math.random() * 2);
                ctx.fillText(text, i * 10, drops[i] * 10);
                if(drops[i] * 10 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);

        function showTab(t) {
            alert(t.toUpperCase() + " modülüne geçiliyor...");
            // Diğer kanalların içeriği buraya eklenebilir
        }
    </script>
</body>
</html>
