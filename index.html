<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameAir | Official</title>
    <style>
        :root {
            --bg-dark: #1b1b1b; /* Game Jolt Gri */
            --bg-lighter: #252525;
            --accent: #2ecc71; /* Fosforlu Yeşil */
            --text-main: #eeeeee;
            --text-sub: #999999;
            --border: #333333;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* AUTH SCREEN */
        #authScreen { position: fixed; inset: 0; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-card { width: 350px; padding: 40px; background: var(--bg-lighter); border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid var(--border); color: white; border-radius: 8px; }
        .btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }

        /* SIDEBAR (KANALLAR) */
        nav { width: 240px; background: var(--bg-lighter); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
        .brand { font-size: 26px; font-weight: 900; background: linear-gradient(to right, #ff3333, #2ecc71); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; text-align: center; }
        .ch-btn { padding: 12px; border-radius: 8px; cursor: pointer; color: var(--text-sub); margin-bottom: 5px; font-weight: 600; }
        .ch-btn:hover, .ch-btn.active { background: #333; color: var(--accent); }
        .ch-btn::before { content: "# "; opacity: 0.5; }

        /* MAIN */
        main { flex: 1; display: flex; flex-direction: column; }
        header { height: 60px; background: var(--bg-lighter); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        
        .user-profile-nav { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .nav-pfp { width: 32px; height: 32px; border-radius: 50%; background: #444; object-fit: cover; border: 1px solid var(--accent); }

        /* FEED & CHAT */
        #content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 700px; }
        
        /* BANNER & PROFILE AREA */
        .header-area { background: var(--bg-lighter); border-radius: 15px; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--border); }
        #bannerImg { height: 160px; width: 100%; object-fit: cover; background: #333; }
        .profile-info { padding: 15px; display: flex; align-items: flex-end; gap: 15px; margin-top: -50px; }
        #mainPfp { width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--bg-lighter); background: #222; }

        .post { background: var(--bg-lighter); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        .admin-tag { color: var(--accent); font-size: 10px; border: 1px solid var(--accent); padding: 2px 5px; border-radius: 4px; margin-left: 10px; }
        video { width: 100%; border-radius: 8px; margin-top: 10px; }

        /* INPUT AREA FOR CHAT */
        .chat-input-box { background: var(--bg-lighter); padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input-box input { margin: 0; }

        .plus-btn { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; background: var(--accent); color: #000; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 11000; }
        .modal-content { background: var(--bg-lighter); padding: 25px; border-radius: 15px; width: 380px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-card">
            <h1 class="brand">GameAir</h1>
            <input type="email" id="email" placeholder="E-posta (Rambler.ru)">
            <input type="password" id="pass" placeholder="Şifre">
            <button class="btn" onclick="login()">Giriş Yap</button>
        </div>
    </div>

    <nav>
        <div class="brand">GameAir</div>
        <div class="ch-btn active" onclick="setCh('duyurular', this)">duyurular</div>
        <div class="ch-btn" onclick="setCh('videolar', this)">videolar</div>
        <div class="ch-btn" onclick="setCh('sohbet', this)">sohbet</div>
        <div class="ch-btn" onclick="setCh('oyunlar', this)">oyunlar</div>
        <div class="ch-btn" onclick="setCh('kurallar', this)">kurallar</div>
    </nav>

    <main>
        <header>
            <div id="chTitle" style="font-weight: bold; color: var(--accent);"># duyurular</div>
            <div class="user-profile-nav" onclick="openModal('settingsModal')">
                <span id="navName">Misafir</span>
                <img id="navPfp" class="nav-pfp" src="">
            </div>
        </header>

        <div id="content">
            <div class="container">
                <div class="header-area">
                    <img id="bannerImg" src="">
                    <div class="profile-info">
                        <img id="mainPfp" src="">
                        <div>
                            <h2 id="profName" style="margin:0">Bczv Studio</h2>
                            <span id="profMail" style="color:var(--text-sub); font-size:12px;"></span>
                        </div>
                    </div>
                </div>
                <div id="feed"></div>
            </div>
        </div>

        <div id="chatBar" class="chat-input-box" style="display:none;">
            <input type="text" id="chatMsg" placeholder="Mesaj gönder...">
            <button class="btn" style="width:80px;" onclick="sendChat()">Gönder</button>
        </div>
    </main>

    <div id="plusBtn" class="plus-btn" onclick="openModal('postModal')">+</div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <h3>Paylaşım Yap</h3>
            <textarea id="postTxt" style="width:100%; height:100px; background:#111; color:white; border-radius:8px; padding:10px; border:1px solid var(--border);"></textarea>
            <input type="file" id="postFile" accept="video/*">
            <button class="btn" style="margin-top:10px;" onclick="publishPost()">Yayınla</button>
            <button onclick="closeModal('postModal')" style="background:none; border:none; color:red; cursor:pointer; margin-top:10px; width:100%;">Kapat</button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3>Profili Düzenle</h3>
            <input type="text" id="setName" placeholder="İsim">
            <label>Profil Fotoğrafı:</label><input type="file" id="setPfp" accept="image/*">
            <label>Banner:</label><input type="file" id="setBanner" accept="image/*">
            <button class="btn" onclick="saveSettings()">Kaydet</button>
            <button onclick="closeModal('settingsModal')" style="background:none; border:none; color:red; cursor:pointer; margin-top:10px; width:100%;">Kapat</button>
        </div>
    </div>

    <script>
        let user = null;
        let channel = "duyurular";
        const ADMIN = "ruslanantonovow6837@rambler.ru";

        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("Boş bırakma!");
            
            user = { email: e, name: e.split('@')[0] };
            localStorage.setItem('gameair_user', JSON.stringify(user));
            document.getElementById('authScreen').style.display = 'none';
            initApp();
        }

        function initApp() {
            const u = JSON.parse(localStorage.getItem('gameair_user'));
            document.getElementById('navName').innerText = u.name;
            document.getElementById('profName').innerText = u.name;
            document.getElementById('profMail').innerText = u.email;
            
            updateUI();
            render();
        }

        function setCh(ch, el) {
            channel = ch;
            document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('chTitle').innerText = "# " + ch;
            updateUI();
            render();
        }

        function updateUI() {
            // Sadece Admin Duyuru ve Videolarda + butonunu görür
            const isPatron = user.email === ADMIN;
            const isMediaCh = (channel === 'duyurular' || channel === 'videolar');
            
            document.getElementById('plusBtn').style.display = (isPatron && isMediaCh) ? 'flex' : 'none';
            document.getElementById('chatBar').style.display = (!isMediaCh) ? 'flex' : 'none';
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function saveSettings() {
            const n = document.getElementById('setName').value;
            const p = document.getElementById('setPfp').files[0];
            const b = document.getElementById('setBanner').files[0];

            if(n) { user.name = n; localStorage.setItem('gameair_user', JSON.stringify(user)); }
            if(p) localStorage.setItem('ga_pfp', await toB64(p));
            if(b) localStorage.setItem('ga_bnr', await toB64(b));
            
            location.reload();
        }

        async function publishPost() {
            const txt = document.getElementById('postTxt').value;
            const file = document.getElementById('postFile').files[0];
            const video = file ? await toB64(file) : null;
            
            saveItem({ type: 'post', ch: channel, text: txt, video: video, author: user.name, mail: user.email });
            closeModal('postModal');
        }

        function sendChat() {
            const m = document.getElementById('chatMsg').value;
            if(!m) return;
            saveItem({ type: 'chat', ch: channel, text: m, author: user.name, mail: user.email });
            document.getElementById('chatMsg').value = "";
        }

        function saveItem(obj) {
            let data = JSON.parse(localStorage.getItem('ga_data') || "[]");
            data.unshift({...obj, date: new Date().toLocaleString()});
            localStorage.setItem('ga_data', JSON.stringify(data));
            render();
        }

        function render() {
            const data = JSON.parse(localStorage.getItem('ga_data') || "[]");
            const filtered = data.filter(d => d.ch === channel);
            
            document.getElementById('navPfp').src = localStorage.getItem('ga_pfp') || "";
            document.getElementById('mainPfp').src = localStorage.getItem('ga_pfp') || "";
            document.getElementById('bannerImg').src = localStorage.getItem('ga_bnr') || "";

            document.getElementById('feed').innerHTML = filtered.map(d => `
                <div class="post">
                    <div style="font-weight:bold; color:var(--accent)">
                        ${d.author} ${d.mail === ADMIN ? '<span class="admin-tag">YÖNETİCİ</span>' : ''}
                    </div>
                    <div style="margin:10px 0;">${d.text}</div>
                    ${d.video ? `<video controls src="${d.video}"></video>` : ''}
                    <div style="font-size:10px; color:var(--text-sub);">${d.date}</div>
                </div>
            `).join('');
        }

        function toB64(file) { return new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(file); }); }
    </script>
</body>
</html>
