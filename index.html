<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameAir | Platform</title>
    <style>
        :root { --accent: #2ecc71; --bg: #f0f2f5; --white: #ffffff; --sidebar: #ffffff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* GİRİŞ EKRANI */
        #authScreen { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-card { width: 320px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }

        /* SOL KATEGORİ MENÜSÜ */
        nav { width: 260px; background: var(--sidebar); border-right: 1px solid #ddd; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .brand { font-size: 24px; font-weight: 900; color: var(--accent); margin-bottom: 30px; letter-spacing: -1px; }
        .channel-btn { padding: 12px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; color: #555; transition: 0.2s; margin-bottom: 5px; display: flex; align-items: center; }
        .channel-btn:hover { background: #f0f2f5; color: var(--accent); }
        .channel-btn.active { background: #e8f5e9; color: var(--accent); }
        .channel-btn::before { content: "#"; margin-right: 10px; opacity: 0.5; }

        /* ANA İÇERİK ALANI */
        main { flex: 1; overflow-y: auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; height: 60px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; box-sizing: border-box; }

        .feed-container { width: 100%; max-width: 600px; padding: 20px; }
        
        /* POST TASARIMI */
        .post { background: white; padding: 20px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 20px; animation: fadeIn 0.3s; }
        .admin-tag { background: #e8f5e9; color: #2ecc71; font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; margin-left: 8px; }
        video { width: 100%; border-radius: 10px; margin-top: 10px; background: #000; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 350px; }
        
        .fab { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-card">
            <h2 style="color:var(--accent)">GameAir</h2>
            <input type="email" id="emailIn" placeholder="E-posta">
            <input type="password" id="passIn" placeholder="Şifre">
            <button class="btn" onclick="handleLogin()">Giriş Yap</button>
        </div>
    </div>

    <nav id="sidebar" style="display:none;">
        <div class="brand">GameAir</div>
        <div class="channel-btn active" onclick="changeChannel('duyurular', this)">duyurular</div>
        <div class="channel-btn" onclick="changeChannel('sohbet', this)">sohbet</div>
        <div class="channel-btn" onclick="changeChannel('oyunlar', this)">oyunlar</div>
        <div class="channel-btn" onclick="changeChannel('kurallar', this)">kurallar</div>
        <div class="channel-btn" onclick="changeChannel('videolar', this)">videolar</div>
        
        <div style="margin-top:auto; font-size:12px; color:#aaa;" id="userDisplay"></div>
    </nav>

    <main id="app" style="display:none;">
        <header>
            <div id="currentChannelTitle" style="font-weight: 800; font-size: 18px;"># duyurular</div>
            <div onclick="openModal('settingsModal')" style="cursor:pointer">⚙️</div>
        </header>

        <div class="feed-container" id="feed">
            </div>
    </main>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Yeni Gönderi</h3>
            <textarea id="postTxt" placeholder="Bir şeyler yaz..." style="width:100%; height:100px; border-radius:10px; border:1px solid #ddd; padding:10px; margin-bottom:10px; resize:none;"></textarea>
            <input type="file" id="postVid" accept="video/*">
            <button class="btn" onclick="sendPost()">Yayınla</button>
            <button onclick="closeModal('postModal')" style="background:none; border:none; color:red; width:100%; margin-top:10px; cursor:pointer;">İptal</button>
        </div>
    </div>

    <div class="fab" id="fabBtn" style="display:none;" onclick="openModal('postModal')">+</div>

    <script>
        let currentChannel = "duyurular";

        function handleLogin() {
            const email = document.getElementById('emailIn').value;
            const pass = document.getElementById('passIn').value;
            
            // İlk girişte kayıt eder, sonraki girişlerde kontrol eder
            if(!localStorage.getItem('admin_email')) {
                localStorage.setItem('admin_email', email);
                localStorage.setItem('admin_pass', pass);
            }

            if(email === localStorage.getItem('admin_email') && pass === localStorage.getItem('admin_pass')) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('sidebar').style.display = 'flex';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('fabBtn').style.display = 'flex';
                document.getElementById('userDisplay').innerText = email;
                renderFeed();
            } else {
                alert("Hatalı Giriş!");
            }
        }

        function changeChannel(ch, el) {
            currentChannel = ch;
            document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('currentChannelTitle').innerText = "# " + ch;
            renderFeed();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function sendPost() {
            const txt = document.getElementById('postTxt').value;
            const file = document.getElementById('postVid').files[0];
            let videoData = null;

            if(file) {
                videoData = await new Promise(res => {
                    const reader = new FileReader();
                    reader.onload = () => res(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            const post = { channel: currentChannel, text: txt, video: videoData, date: new Date().toLocaleString() };
            let posts = JSON.parse(localStorage.getItem('ga_posts_v6') || "[]");
            posts.unshift(post);
            localStorage.setItem('ga_posts_v6', JSON.stringify(posts));

            document.getElementById('postTxt').value = "";
            closeModal('postModal');
            renderFeed();
        }

        function renderFeed() {
            const posts = JSON.parse(localStorage.getItem('ga_posts_v6') || "[]");
            const filtered = posts.filter(p => p.channel === currentChannel);
            const adminName = localStorage.getItem('admin_email').split('@')[0];

            document.getElementById('feed').innerHTML = filtered.map(p => `
                <div class="post">
                    <div style="font-weight:bold">${adminName} <span class="admin-tag">YÖNETİCİ</span></div>
                    <p style="margin:10px 0;">${p.text}</p>
                    ${p.video ? `<video controls src="${p.video}"></video>` : ''}
                    <div style="font-size:10px; color:#aaa;">${p.date}</div>
                </div>
            `).join(filtered.length ? '' : '<p style="text-align:center; color:#999; margin-top:50px;">Bu kanal henüz boş kanka.</p>');
        }
    </script>
</body>
</html>
