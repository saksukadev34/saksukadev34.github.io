<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameAir | Future</title>
    <style>
        :root {
            --bg-body: #141414;
            --bg-card: #1f1f1f;
            --accent: #2ecc71; /* Fosforlu Yeşil */
            --text: #ffffff;
            --border: #333;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* GİRİŞ EKRANI */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg-body); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { width: 320px; padding: 30px; background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid var(--border); color: white; border-radius: 10px; box-sizing: border-box; }
        .btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }

        /* SIDEBAR */
        nav { width: 240px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .logo { font-size: 28px; font-weight: 900; color: var(--accent); margin-bottom: 40px; text-shadow: 0 0 10px rgba(46, 204, 113, 0.3); }
        .ch { padding: 12px; border-radius: 10px; cursor: pointer; color: #888; margin-bottom: 5px; transition: 0.2s; }
        .ch:hover, .ch.active { background: #2a2a2a; color: var(--accent); }
        .ch::before { content: "# "; }

        /* ANA ALAN */
        main { flex: 1; display: flex; flex-direction: column; }
        header { height: 65px; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; box-sizing: border-box; }
        
        .nav-user { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .nav-pfp { width: 35px; height: 35px; border-radius: 50%; background: #444; border: 2px solid var(--accent); object-fit: cover; }

        #scrollArea { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 650px; }

        /* PROFIL */
        .profile-header { background: var(--bg-card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; }
        #bannerBox { height: 150px; width: 100%; background: #2a2a2a; object-fit: cover; }
        .pfp-row { padding: 15px; display: flex; align-items: flex-end; gap: 15px; margin-top: -60px; }
        #mainPfp { width: 100px; height: 100px; border-radius: 50%; border: 5px solid var(--bg-card); background: #333; object-fit: cover; }

        /* POSTLAR */
        .post { background: var(--bg-card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        .badge { background: var(--accent); color: #000; font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-left: 10px; font-weight: bold; vertical-align: middle; }
        video { width: 100%; border-radius: 10px; margin-top: 10px; background: #000; }

        /* CHAT BAR */
        .chat-bar { background: var(--bg-card); padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; padding-bottom: 25px; }
        
        .add-btn { position: fixed; bottom: 40px; right: 40px; width: 60px; height: 60px; background: var(--accent); color: #000; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 35px; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.5); font-weight: bold; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 10000; }
        .modal-box { background: var(--bg-card); padding: 30px; border-radius: 20px; width: 350px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-card">
            <h1 class="logo">GameAir</h1>
            <p style="font-size: 13px; color: #777;">Hesabınla Giriş Yap</p>
            <input type="email" id="logEmail" placeholder="E-posta">
            <input type="password" id="logPass" placeholder="Şifre">
            <button class="btn" onclick="enterApp()">Sisteme Gir</button>
        </div>
    </div>

    <nav>
        <div class="logo">GameAir</div>
        <div class="ch active" onclick="goCh('duyurular', this)">duyurular</div>
        <div class="ch" onclick="goCh('videolar', this)">videolar</div>
        <div class="ch" onclick="goCh('sohbet', this)">sohbet</div>
        <div class="ch" onclick="goCh('oyunlar', this)">oyunlar</div>
        <div class="ch" onclick="goCh('kurallar', this)">kurallar</div>
    </nav>

    <main>
        <header>
            <div id="chName" style="color: var(--accent); font-weight: 800;"># duyurular</div>
            <div class="nav-user" onclick="openM('setM')">
                <span id="topName">Misafir</span>
                <img id="topPfp" class="nav-pfp" src="">
            </div>
        </header>

        <div id="scrollArea">
            <div class="container">
                <div class="profile-header">
                    <img id="bannerBox" src="">
                    <div class="pfp-row">
                        <img id="mainPfp" src="">
                        <div>
                            <h2 id="profN" style="margin:0">Yükleniyor...</h2>
                            <p id="profE" style="color:#666; margin:0; font-size: 13px;"></p>
                        </div>
                    </div>
                </div>
                <div id="feed"></div>
            </div>
        </div>

        <div id="chatBox" class="chat-bar" style="display:none;">
            <input type="text" id="chatInput" placeholder="Mesaj yazın...">
            <button class="btn" style="width: 100px;" onclick="sendMsg()">Gönder</button>
        </div>
    </main>

    <div id="plus" class="add-btn" onclick="openM('postM')">+</div>

    <div id="postM" class="modal">
        <div class="modal-box">
            <h3>İçerik Yayınla</h3>
            <textarea id="pTxt" style="width:100%; height:100px; background:#111; color:#fff; border:1px solid #333; padding:10px; border-radius:10px; margin-bottom:10px; resize:none;"></textarea>
            <input type="file" id="pVid" accept="video/*">
            <button class="btn" onclick="pushPost()">Yayınla</button>
            <button onclick="closeM('postM')" style="background:none; border:none; color:red; margin-top:10px; width:100%; cursor:pointer;">İptal</button>
        </div>
    </div>

    <div id="setM" class="modal">
        <div class="modal-box">
            <h3>Profili Düzenle</h3>
            <input type="text" id="setName" placeholder="İsim">
            <label style="font-size:12px;">Profil Fotoğrafı:</label><input type="file" id="setPfp" accept="image/*">
            <label style="font-size:12px;">Banner:</label><input type="file" id="setBnr" accept="image/*">
            <button class="btn" onclick="saveSet()">Kaydet</button>
            <button onclick="closeM('setM')" style="background:none; border:none; color:red; margin-top:10px; width:100%; cursor:pointer;">Kapat</button>
        </div>
    </div>

    <script>
        let me = null;
        let activeCh = "duyurular";
        const ADMIN_MAIL = "ruslanantonovow6837@rambler.ru";

        function enterApp() {
            const e = document.getElementById('logEmail').value;
            const p = document.getElementById('logPass').value;
            if(!e) return alert("E-posta yaz kanka");

            me = { email: e, name: e.split('@')[0] };
            document.getElementById('loginOverlay').style.display = 'none';
            
            document.getElementById('topName').innerText = me.name;
            document.getElementById('profN').innerText = me.name;
            document.getElementById('profE').innerText = me.email;
            
            syncUI();
            draw();
        }

        function goCh(c, el) {
            activeCh = c;
            document.querySelectorAll('.ch').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('chName').innerText = "# " + c;
            syncUI();
            draw();
        }

        function syncUI() {
            const isMedia = (activeCh === 'duyurular' || activeCh === 'videolar');
            const isBoss = (me.email === ADMIN_MAIL);
            
            document.getElementById('plus').style.display = (isBoss && isMedia) ? 'flex' : 'none';
            document.getElementById('chatBox').style.display = (!isMedia) ? 'flex' : 'none';
        }

        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        async function saveSet() {
            const n = document.getElementById('setName').value;
            const p = document.getElementById('setPfp').files[0];
            const b = document.getElementById('setBnr').files[0];

            if(n) me.name = n;
            if(p) localStorage.setItem('u_pfp', await f2b(p));
            if(b) localStorage.setItem('u_bnr', await f2b(b));
            
            document.getElementById('profN').innerText = me.name;
            document.getElementById('topName').innerText = me.name;
            closeM('setM');
            draw();
        }

        async function pushPost() {
            const t = document.getElementById('pTxt').value;
            const v = document.getElementById('pVid').files[0];
            let vData = v ? await f2b(v) : null;
            
            addItem({ type: 'post', text: t, media: vData, user: me.name, mail: me.email });
            closeM('postM');
            document.getElementById('pTxt').value = "";
        }

        function sendMsg() {
            const m = document.getElementById('chatInput').value;
            if(!m) return;
            addItem({ type: 'chat', text: m, user: me.name, mail: me.email });
            document.getElementById('chatInput').value = "";
        }

        function addItem(obj) {
            let store = JSON.parse(localStorage.getItem('ga_data_v7') || "[]");
            store.unshift({...obj, ch: activeCh, time: new Date().toLocaleString()});
            localStorage.setItem('ga_data_v7', JSON.stringify(store));
            draw();
        }

        function draw() {
            const store = JSON.parse(localStorage.getItem('ga_data_v7') || "[]");
            const filter = store.filter(x => x.ch === activeCh);
            
            document.getElementById('topPfp').src = localStorage.getItem('u_pfp') || "";
            document.getElementById('mainPfp').src = localStorage.getItem('u_pfp') || "";
            document.getElementById('bannerBox').src = localStorage.getItem('u_bnr') || "";

            document.getElementById('feed').innerHTML = filter.map(x => `
                <div class="post">
                    <div style="font-weight:bold; color:var(--accent)">
                        ${x.user} ${x.mail === ADMIN_MAIL ? '<span class="badge">YÖNETİCİ</span>' : ''}
                    </div>
                    <div style="margin:10px 0; line-height:1.5;">${x.text}</div>
                    ${x.media ? `<video controls src="${x.media}"></video>` : ''}
                    <div style="font-size:10px; color:#666;">${x.time}</div>
                </div>
            `).join('');
        }

        function f2b(file) { return new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(file); }); }
    </script>
</body>
</html>
