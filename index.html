<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameAir | Admin & Media Platform</title>
    <style>
        :root {
            --accent: linear-gradient(135deg, #2ecc71, #27ae60);
            --bg: #f8f9fa;
            --white: #ffffff;
            --text: #1c1e21;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* GİRİŞ EKRANI (LOGIN) */
        #loginScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-card {
            width: 350px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        /* ANA PANEL TASARIMI */
        #mainContent { display: none; }

        header {
            background: var(--white);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #e1e8ed;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            box-sizing: border-box;
        }

        .logo { font-size: 22px; font-weight: 800; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .add-btn {
            width: 40px; height: 40px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }

        /* İÇERİK ALANI */
        .container { margin-top: 80px; display: flex; justify-content: center; }
        .feed { width: 600px; }

        .profile-card {
            background: var(--white);
            border-radius: 15px;
            border: 1px solid #dddfe2;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .banner { height: 120px; background: var(--accent); }
        .info { padding: 15px; text-align: center; }
        .pfp { width: 80px; height: 80px; border-radius: 50%; background: #eee; margin: -50px auto 10px; border: 4px solid white; }

        .post { background: white; padding: 20px; border-radius: 12px; border: 1px solid #dddfe2; margin-bottom: 20px; }

        /* MODAL (YÜKLEME PENCERESİ) */
        #uploadModal {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5); z-index: 1000;
            width: 400px;
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h2 class="logo">GameAir Login</h2>
            <p style="font-size: 13px; color: #666;">Yönetici Hesabı ile Giriş Yapın</p>
            <input type="email" id="userEmail" placeholder="E-posta (Rambler)">
            <input type="password" id="userPass" placeholder="Şifre">
            <button class="btn" onclick="checkLogin()">Sisteme Gir</button>
            <p id="error" style="color:red; font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="mainContent">
        <header>
            <div class="logo">GameAir</div>
            <div class="add-btn" onclick="openModal()">+</div>
        </header>

        <div class="container">
            <div class="feed">
                <div class="profile-card">
                    <div class="banner"></div>
                    <div class="info">
                        <div class="pfp"></div>
                        <h2 id="display-name">Bczv Studio</h2>
                        <p id="display-mail">ruslanantonovow6837@rambler.ru</p>
                        <button onclick="changeName()" style="font-size: 11px; border: none; background: #eee; padding: 5px; cursor:pointer;">İsim Değiştir</button>
                    </div>
                </div>

                <div id="postsArea">
                    <div class="post">🚀 Sistem Hazır. Yukarıdaki + butonundan duyuru veya video paylaşabilirsiniz.</div>
                </div>
            </div>
        </div>
    </div>

    <div id="uploadModal">
        <h3>Yeni Paylaşım</h3>
        <textarea id="postText" placeholder="Duyuru yazın..." style="width:100%; height:80px; margin-bottom:10px;"></textarea>
        <input type="text" id="videoLink" placeholder="Video Linki (Opsiyonel)">
        <button class="btn" onclick="publishPost()">Yayınla</button>
        <button onclick="closeModal()" style="background:none; border:none; color:red; margin-top:10px; cursor:pointer; width:100%;">İptal</button>
    </div>

    <script>
        const adminEmail = "ruslanantonovow6837@rambler.ru";
        const adminPass = "Bczv2026"; // BURADAN ŞİFRENİ DEĞİŞTİREBİLİRSİN

        function checkLogin() {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;

            if(email === adminEmail && pass === adminPass) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                document.getElementById('error').innerText = "Hatalı Giriş! Yetkisiz Erişim Engellendi.";
            }
        }

        function openModal() { document.getElementById('uploadModal').style.display = 'block'; }
        function closeModal() { document.getElementById('uploadModal').style.display = 'none'; }

        function publishPost() {
            const text = document.getElementById('postText').value;
            const video = document.getElementById('videoLink').value;
            const area = document.getElementById('postsArea');

            let videoHtml = video ? `<div style="background:#000; color:white; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; border-radius:8px; margin-top:10px;">Video: ${video}</div>` : '';

            area.innerHTML = `<div class="post"><strong>${document.getElementById('display-name').innerText}:</strong><br>${text}${videoHtml}</div>` + area.innerHTML;
            
            closeModal();
            document.getElementById('postText').value = "";
            document.getElementById('videoLink').value = "";
        }

        function changeName() {
            const newName = prompt("Yeni isminizi girin:");
            if(newName) document.getElementById('display-name').innerText = newName;
        }
    </script>
</body>
</html>
